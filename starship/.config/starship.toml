# Starship config -- Tokyo Night palette
# based on folke/tokyonight.nvim night variant

"$schema" = 'https://starship.rs/config-schema.json'

format = """[](color_panel)\
$username\
[](bg:color_dir fg:color_panel)\
$directory\
[](fg:color_dir bg:color_git)\
$git_branch\
$git_status\
[](fg:color_git bg:color_lang)\
$python\
$nodejs\
$rust\
$golang\
$lua\
$docker_context\
$kubernetes\
[](fg:color_lang bg:color_time)\
$time\
[ ](fg:color_time)\
$character"""

palette = "tokyo_night"

[palettes.tokyo_night]
# panel backgrounds (dark)
color_panel = "#16161e"
color_dir   = "#1a1b26"
color_git   = "#24283b"
color_lang  = "#1a1b26"
color_time  = "#24283b"
# accents
color_cyan    = "#7dcfff"
color_green   = "#9ece6a"
color_magenta = "#bb9af7"
color_blue    = "#7aa2f7"
color_amber   = "#e0af68"
color_red     = "#f7768e"
color_text    = "#c0caf5"
color_dim     = "#565f89"

[os]
disabled = true

[username]
show_always = true
style_user = "bg:color_panel fg:color_text"
style_root = "bg:color_panel fg:color_red"
format = '[ $user ]($style)'

[directory]
style = "bg:color_dir fg:color_cyan"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚"
"Music"     = "󰝚"
"Pictures"  = "󰉏"
"workspace" = "󰙴"

[git_branch]
symbol = "󰊢"
style = "bg:color_git fg:color_amber"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:color_git fg:color_magenta"
format = '[$all_status$ahead_behind ]($style)'

[python]
symbol = "󰌠"
style = "bg:color_lang fg:color_green"
format = '[ $symbol($version)(\($virtualenv\)) ]($style)'

[nodejs]
symbol = "󰎙"
style = "bg:color_lang fg:color_green"
format = '[ $symbol($version) ]($style)'

[rust]
symbol = "󱘗"
style = "bg:color_lang fg:color_amber"
format = '[ $symbol($version) ]($style)'

[golang]
symbol = "󰟓"
style = "bg:color_lang fg:color_cyan"
format = '[ $symbol($version) ]($style)'

[lua]
symbol = "󰢱"
style = "bg:color_lang fg:color_blue"
format = '[ $symbol($version) ]($style)'

[docker_context]
symbol = "󰡨"
style = "bg:color_lang fg:color_blue"
format = '[ $symbol$context ]($style)'

[kubernetes]
disabled = false
symbol = "󱃾"
style = "bg:color_lang fg:color_magenta"
format = '[ $symbol$context( \($namespace\)) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_time fg:color_cyan"
format = '[ 󰥔 $time ]($style)'

[character]
success_symbol = '[❯](bold #9ece6a)'
error_symbol   = '[❯](bold #f7768e)'
vimcmd_symbol  = '[❮](bold #e0af68)'

[cmd_duration]
min_time = 500
format = "[ took $duration]($style) "
style = "fg:#e0af68"
